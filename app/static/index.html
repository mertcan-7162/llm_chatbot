<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OCR + RAG Chatbot</title>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'light') document.documentElement.classList.remove('dark');
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            ink: {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              300: '#cbd5e1',
              400: '#94a3b8',
              500: '#64748b',
              600: '#475569',
              700: '#334155',
              800: '#1e293b',
              900: '#0f172a',
              950: '#020617',
            },
            brand: {
              50: '#eef2ff',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
            }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes pulse-dot {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
    .dot { animation: pulse-dot 1.4s infinite ease-in-out both; }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    .messages-scroll::-webkit-scrollbar { width: 6px; }
    .messages-scroll::-webkit-scrollbar-track { background: transparent; }
    .dark .messages-scroll::-webkit-scrollbar-thumb { background: rgb(51 65 85); border-radius: 3px; }
    .messages-scroll::-webkit-scrollbar-thumb { background: rgb(203 213 225); border-radius: 3px; }
    .drop-active { background-color: rgba(99, 102, 241, 0.1); border-color: rgb(99, 102, 241); }

    .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 { font-weight: 600; margin-top: 1em; margin-bottom: 0.5em; }
    .markdown-body h1 { font-size: 1.25rem; }
    .markdown-body h2 { font-size: 1.125rem; }
    .markdown-body h3 { font-size: 1rem; }
    .markdown-body p { margin-bottom: 0.5em; }
    .markdown-body ul, .markdown-body ol { padding-left: 1.5em; margin-bottom: 0.5em; }
    .markdown-body ul { list-style-type: disc; }
    .markdown-body ol { list-style-type: decimal; }
    .markdown-body li { margin-bottom: 0.2em; }
    .markdown-body code { background: rgba(99,102,241,0.1); padding: 0.15em 0.35em; border-radius: 4px; font-size: 0.85em; }
    .markdown-body pre { border-radius: 8px; padding: 0.75em 1em; overflow-x: auto; margin-bottom: 0.75em; }
    .dark .markdown-body pre { background: rgb(15,23,42); border: 1px solid rgb(51,65,85); }
    .markdown-body pre { background: rgb(241,245,249); border: 1px solid rgb(226,232,240); }
    .markdown-body pre code { background: none; padding: 0; }
    .markdown-body blockquote { border-left: 3px solid rgb(99,102,241); padding-left: 0.75em; margin: 0.5em 0; }
    .dark .markdown-body blockquote { color: rgb(148,163,184); }
    .markdown-body blockquote { color: rgb(100,116,139); }
    .markdown-body table { border-collapse: collapse; width: 100%; margin-bottom: 0.75em; }
    .dark .markdown-body th, .dark .markdown-body td { border: 1px solid rgb(51,65,85); }
    .markdown-body th, .markdown-body td { border: 1px solid rgb(226,232,240); padding: 0.4em 0.75em; text-align: left; }
    .markdown-body th { background: rgba(99,102,241,0.1); font-weight: 600; }
    .markdown-body a { color: rgb(99,102,241); text-decoration: underline; }
    .dark .markdown-body hr { border-color: rgb(51,65,85); }
    .markdown-body hr { border-color: rgb(226,232,240); margin: 1em 0; }
  </style>
</head>
<body class="bg-white text-gray-900 dark:bg-ink-950 dark:text-ink-100 h-screen overflow-hidden">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-80 bg-gray-50 dark:bg-ink-900 border-r border-gray-200 dark:border-ink-800 flex flex-col">
      <div class="p-5 border-b border-gray-200 dark:border-ink-800">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-lg bg-brand-600 flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
          </div>
          <div class="flex-1">
            <h1 class="font-semibold text-gray-900 dark:text-ink-100">OCR Chatbot</h1>
            <p class="text-xs text-gray-500 dark:text-ink-400">PaddleOCR + RAG</p>
          </div>
          <button id="theme-toggle"
                  class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-500 dark:text-ink-400 hover:bg-gray-200 dark:hover:bg-ink-800 transition"
                  title="Toggle theme">
            <svg id="icon-sun" class="w-4.5 h-4.5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <svg id="icon-moon" class="w-4.5 h-4.5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Upload -->
      <div class="p-5 border-b border-gray-200 dark:border-ink-800">
        <label class="text-xs font-medium text-gray-500 dark:text-ink-400 uppercase tracking-wide">Upload Document</label>
        <div id="drop-zone"
             class="mt-2 border-2 border-dashed border-gray-300 dark:border-ink-700 rounded-lg p-5 text-center cursor-pointer hover:border-brand-500 hover:bg-gray-100 dark:hover:bg-ink-800/50 transition">
          <svg class="w-8 h-8 mx-auto text-gray-400 dark:text-ink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
          </svg>
          <p id="drop-label" class="mt-2 text-sm text-gray-600 dark:text-ink-300">Drop a file or <span class="text-brand-500">browse</span></p>
          <p id="drop-hint" class="mt-1 text-xs text-gray-400 dark:text-ink-500">PDF, PNG, JPG, TIFF, WEBP</p>
          <div id="selected-file" class="hidden mt-2 flex items-center justify-center gap-2 text-sm text-brand-500">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <span id="selected-file-name" class="truncate max-w-[180px]"></span>
          </div>
          <input id="file-input" type="file" class="hidden"
                 accept=".pdf,.png,.jpg,.jpeg,.tiff,.tif,.bmp,.webp" />
        </div>
        <div id="uploaded-files" class="mt-2 hidden">
          <p class="text-xs font-medium text-gray-500 dark:text-ink-400 uppercase tracking-wide mb-1.5">Documents</p>
          <ul id="uploaded-files-list" class="space-y-1"></ul>
        </div>
        <div id="upload-status" class="mt-3 hidden"></div>
      </div>

      <!-- Settings -->
      <div class="p-5 flex-1 overflow-y-auto">
        <label class="text-xs font-medium text-gray-500 dark:text-ink-400 uppercase tracking-wide">Retrieval</label>
        <div class="mt-2">
          <label class="text-xs text-gray-500 dark:text-ink-400 flex items-center justify-between">
            <span>Top-K results</span>
            <span id="topk-value" class="text-gray-700 dark:text-ink-200 font-mono">5</span>
          </label>
          <input id="topk-slider" type="range" min="1" max="20" value="5"
                 class="mt-1 w-full accent-brand-500" />
        </div>
        <div class="mt-3">
          <label class="text-xs text-gray-500 dark:text-ink-400 flex items-center justify-between">
            <span>Min relevance</span>
            <span id="relevance-value" class="text-gray-700 dark:text-ink-200 font-mono">0.30</span>
          </label>
          <input id="relevance-slider" type="range" min="0" max="100" value="30"
                 class="mt-1 w-full accent-brand-500" />
        </div>
      </div>

      <div class="p-5 border-t border-gray-200 dark:border-ink-800">
        <button id="new-chat-btn"
                class="w-full px-3 py-2 bg-gray-100 dark:bg-ink-800 hover:bg-gray-200 dark:hover:bg-ink-700 border border-gray-300 dark:border-ink-700 rounded-md text-sm text-gray-700 dark:text-ink-200 transition flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
          New Chat
        </button>
      </div>
    </aside>

    <!-- Main chat -->
    <main class="flex-1 flex flex-col bg-white dark:bg-ink-950">
      <header class="px-6 py-4 border-b border-gray-200 dark:border-ink-800">
        <h2 class="font-semibold">Chat</h2>
        <p class="text-xs text-gray-500 dark:text-ink-400">Chat freely or upload a document to ask questions about it</p>
      </header>

      <div id="messages" class="flex-1 overflow-y-auto messages-scroll px-6 py-6 space-y-4">
        <div class="max-w-2xl mx-auto text-center mt-20">
          <div class="w-14 h-14 mx-auto rounded-2xl bg-brand-600/20 flex items-center justify-center">
            <svg class="w-7 h-7 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
            </svg>
          </div>
          <h3 class="mt-4 text-lg font-semibold">Start a conversation</h3>
          <p class="mt-2 text-sm text-gray-500 dark:text-ink-400">Upload a PDF or image, then ask questions about it.</p>
        </div>
      </div>

      <form id="chat-form" class="border-t border-gray-200 dark:border-ink-800 p-4 bg-gray-50/50 dark:bg-ink-900/50">
        <div class="max-w-4xl mx-auto flex items-end gap-3 bg-gray-100 dark:bg-ink-800 border border-gray-300 dark:border-ink-700 rounded-2xl p-3 focus-within:border-brand-500 transition">
          <textarea
            id="chat-input"
            rows="1"
            placeholder="Ask something about your documents..."
            class="flex-1 bg-transparent resize-none outline-none text-sm text-gray-900 dark:text-ink-100 placeholder-gray-400 dark:placeholder-ink-500 max-h-40"
          ></textarea>
          <button type="submit" id="send-btn"
                  class="w-9 h-9 flex-shrink-0 bg-brand-600 hover:bg-brand-700 disabled:bg-gray-300 dark:disabled:bg-ink-700 disabled:cursor-not-allowed rounded-lg flex items-center justify-center transition">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19V5m0 0l-7 7m7-7l7 7" />
            </svg>
          </button>
        </div>
        <p class="text-xs text-gray-400 dark:text-ink-500 text-center mt-2">Enter to send, Shift+Enter for a new line</p>
      </form>
    </main>
  </div>

  <script>
    marked.setOptions({ breaks: true, gfm: true });

    const API = '';
    const state = {
      collection: 'default',
      topK: 5,
      minScore: 0.3,
      conversationHistory: [],
    };

    const $ = (sel) => document.querySelector(sel);
    const messagesEl = $('#messages');
    const chatForm = $('#chat-form');
    const chatInput = $('#chat-input');
    const sendBtn = $('#send-btn');
    const dropZone = $('#drop-zone');
    const fileInput = $('#file-input');
    const uploadStatus = $('#upload-status');
    const dropLabel = $('#drop-label');
    const dropHint = $('#drop-hint');
    const selectedFileEl = $('#selected-file');
    const selectedFileName = $('#selected-file-name');
    const uploadedFilesEl = $('#uploaded-files');
    const uploadedFilesList = $('#uploaded-files-list');
    const topkSlider = $('#topk-slider');
    const topkValue = $('#topk-value');
    const relevanceSlider = $('#relevance-slider');
    const relevanceValue = $('#relevance-value');
    const newChatBtn = $('#new-chat-btn');
    const themeToggle = $('#theme-toggle');

    // ---- theme ----
    themeToggle.addEventListener('click', () => {
      const html = document.documentElement;
      const isDark = html.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // ---- sliders ----
    topkSlider.addEventListener('input', () => {
      state.topK = parseInt(topkSlider.value, 10);
      topkValue.textContent = state.topK;
    });

    relevanceSlider.addEventListener('input', () => {
      state.minScore = parseInt(relevanceSlider.value, 10) / 100;
      relevanceValue.textContent = state.minScore.toFixed(2);
    });

    // ---- new chat ----
    async function clearCollection() {
      try {
        const res = await fetch(`${API}/api/v1/collections/${encodeURIComponent(state.collection)}`, { method: 'DELETE' });
        if (!res.ok) console.warn('Failed to clear collection:', res.statusText);
      } catch (e) {
        console.warn('Failed to clear collection:', e);
      }
    }

    async function resetChat() {
      await clearCollection();
      state.conversationHistory = [];
      messagesEl.innerHTML = `
        <div class="max-w-2xl mx-auto text-center mt-20">
          <div class="w-14 h-14 mx-auto rounded-2xl bg-brand-600/20 flex items-center justify-center">
            <svg class="w-7 h-7 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
            </svg>
          </div>
          <h3 class="mt-4 text-lg font-semibold">Start a conversation</h3>
          <p class="mt-2 text-sm text-gray-500 dark:text-ink-400">Upload a PDF or image, then ask questions about it.</p>
        </div>`;
      uploadStatus.innerHTML = '';
      uploadStatus.classList.add('hidden');
      resetDropZone();
      await loadDocuments();
    }

    newChatBtn.addEventListener('click', resetChat);

    // ---- textarea autosize + enter to send ----
    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 160) + 'px';
    });

    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        chatForm.requestSubmit();
      }
    });

    // ---- message rendering ----
    function clearWelcome() {
      const welcome = messagesEl.querySelector('.text-center.mt-20');
      if (welcome) welcome.remove();
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function addUserMessage(text) {
      clearWelcome();
      const wrapper = document.createElement('div');
      wrapper.className = 'max-w-3xl mx-auto flex justify-end';
      wrapper.innerHTML = `
        <div class="max-w-[80%] bg-brand-600 text-white rounded-2xl rounded-tr-sm px-4 py-2.5 text-sm whitespace-pre-wrap">${escapeHTML(text)}</div>
      `;
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addAssistantPlaceholder() {
      clearWelcome();
      const wrapper = document.createElement('div');
      wrapper.className = 'max-w-3xl mx-auto flex gap-3';
      wrapper.innerHTML = `
        <div class="w-8 h-8 flex-shrink-0 rounded-lg bg-brand-600/20 flex items-center justify-center">
          <svg class="w-4 h-4 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
          </svg>
        </div>
        <div class="assistant-bubble flex-1 bg-gray-50 dark:bg-ink-900 border border-gray-200 dark:border-ink-800 rounded-2xl rounded-tl-sm px-4 py-3 text-sm">
          <div class="flex gap-1.5 items-center h-5">
            <span class="dot w-2 h-2 bg-gray-400 dark:bg-ink-500 rounded-full"></span>
            <span class="dot w-2 h-2 bg-gray-400 dark:bg-ink-500 rounded-full"></span>
            <span class="dot w-2 h-2 bg-gray-400 dark:bg-ink-500 rounded-full"></span>
          </div>
        </div>
      `;
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return wrapper;
    }

    function renderSources(sources) {
      if (!sources || !sources.length) return '';
      const items = sources.map((s, i) => `
        <details class="bg-gray-100 dark:bg-ink-950 border border-gray-200 dark:border-ink-800 rounded-md group">
          <summary class="px-3 py-2 text-xs text-gray-500 dark:text-ink-400 cursor-pointer flex items-center justify-between hover:text-gray-700 dark:hover:text-ink-200">
            <span class="font-medium">[${i + 1}] ${escapeHTML(s.source)} (p.${s.page})</span>
            <span class="font-mono text-gray-400 dark:text-ink-500">${(s.score * 100).toFixed(1)}%</span>
          </summary>
          <div class="px-3 pb-3 text-xs text-gray-600 dark:text-ink-300 whitespace-pre-wrap leading-relaxed">${escapeHTML(s.text)}</div>
        </details>
      `).join('');
      return `
        <div class="mt-3 pt-3 border-t border-gray-200 dark:border-ink-800">
          <div class="text-xs font-medium text-gray-500 dark:text-ink-400 uppercase tracking-wide mb-2">Sources</div>
          <div class="space-y-1.5">${items}</div>
        </div>
      `;
    }

    function renderMarkdown(text) {
      const raw = marked.parse(text);
      return DOMPurify.sanitize(raw);
    }

    function fillAssistantMessage(wrapper, answer, sources) {
      const bubble = wrapper.querySelector('.assistant-bubble');
      bubble.innerHTML = `
        <div class="markdown-body leading-relaxed">${renderMarkdown(answer)}</div>
        ${renderSources(sources)}
      `;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function fillAssistantError(wrapper, message) {
      const bubble = wrapper.querySelector('.assistant-bubble');
      bubble.classList.remove('border-gray-200', 'dark:border-ink-800');
      bubble.classList.add('border-red-900', 'bg-red-950/40');
      bubble.innerHTML = `<div class="text-red-300 text-sm">${escapeHTML(message)}</div>`;
    }

    // ---- chat submit ----
    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = chatInput.value.trim();
      if (!text) return;

      addUserMessage(text);
      chatInput.value = '';
      chatInput.style.height = 'auto';
      sendBtn.disabled = true;

      const placeholder = addAssistantPlaceholder();

      try {
        const res = await fetch(`${API}/api/v1/query`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            query: text,
            collection_name: state.collection,
            n_results: state.topK,
            min_score: state.minScore,
            conversation_history: state.conversationHistory,
          }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }
        const data = await res.json();
        fillAssistantMessage(placeholder, data.answer, data.sources);
        state.conversationHistory.push({ role: 'user', content: text });
        state.conversationHistory.push({ role: 'assistant', content: data.answer });
      } catch (err) {
        fillAssistantError(placeholder, `Error: ${err.message}`);
      } finally {
        sendBtn.disabled = false;
        chatInput.focus();
      }
    });

    // ---- file upload ----
    dropZone.addEventListener('click', () => fileInput.click());

    ['dragenter', 'dragover'].forEach(ev => {
      dropZone.addEventListener(ev, (e) => {
        e.preventDefault();
        dropZone.classList.add('drop-active');
      });
    });
    ['dragleave', 'drop'].forEach(ev => {
      dropZone.addEventListener(ev, (e) => {
        e.preventDefault();
        dropZone.classList.remove('drop-active');
      });
    });
    dropZone.addEventListener('drop', (e) => {
      const file = e.dataTransfer.files[0];
      if (file) uploadFile(file);
    });
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) uploadFile(file);
    });

    function showSelectedFile(name) {
      dropLabel.classList.add('hidden');
      dropHint.classList.add('hidden');
      selectedFileName.textContent = name;
      selectedFileName.title = name;
      selectedFileEl.classList.remove('hidden');
    }

    function resetDropZone() {
      selectedFileEl.classList.add('hidden');
      dropLabel.classList.remove('hidden');
      dropHint.classList.remove('hidden');
    }

    async function loadDocuments() {
      try {
        const res = await fetch(`${API}/api/v1/documents?collection_name=${encodeURIComponent(state.collection)}`);
        if (!res.ok) return;
        const data = await res.json();
        uploadedFilesList.innerHTML = '';
        if (data.documents.length === 0) {
          uploadedFilesEl.classList.add('hidden');
          return;
        }
        uploadedFilesEl.classList.remove('hidden');
        for (const name of data.documents) {
          appendFileItem(name);
        }
      } catch (e) {
        console.warn('Failed to load documents:', e);
      }
    }

    function appendFileItem(name) {
      uploadedFilesEl.classList.remove('hidden');
      const li = document.createElement('li');
      li.className = 'flex items-center gap-2 text-xs text-gray-600 dark:text-ink-300 bg-gray-100 dark:bg-ink-800 border border-gray-300 dark:border-ink-700 rounded-md px-2.5 py-1.5 group';
      li.innerHTML = `
        <svg class="w-3.5 h-3.5 flex-shrink-0 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        <span class="truncate flex-1" title="${escapeHTML(name)}">${escapeHTML(name)}</span>
        <button class="delete-doc-btn opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-300 transition p-0.5" title="Remove">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      `;
      li.querySelector('.delete-doc-btn').addEventListener('click', async (e) => {
        e.stopPropagation();
        try {
          const res = await fetch(`${API}/api/v1/documents/${encodeURIComponent(name)}?collection_name=${encodeURIComponent(state.collection)}`, { method: 'DELETE' });
          if (!res.ok) console.warn('Failed to delete document');
        } catch (err) {
          console.warn('Delete failed:', err);
        }
        await loadDocuments();
      });
      uploadedFilesList.appendChild(li);
    }

    function showUploadStatus(html, kind = 'info') {
      const colors = {
        info: 'border-brand-500/30 bg-brand-500/10 text-brand-700 dark:text-brand-50',
        success: 'border-emerald-500/30 bg-emerald-500/10 text-emerald-700 dark:text-emerald-200',
        error: 'border-red-500/30 bg-red-500/10 text-red-700 dark:text-red-200',
      };
      uploadStatus.className = `mt-3 p-3 border rounded-md text-xs ${colors[kind]}`;
      uploadStatus.innerHTML = html;
      uploadStatus.classList.remove('hidden');
    }

    async function uploadFile(file) {
      showSelectedFile(file.name);
      showUploadStatus(`
        <div class="flex items-center gap-2">
          <div class="flex gap-1">
            <span class="dot w-1.5 h-1.5 bg-current rounded-full"></span>
            <span class="dot w-1.5 h-1.5 bg-current rounded-full"></span>
            <span class="dot w-1.5 h-1.5 bg-current rounded-full"></span>
          </div>
          <span>Processing <strong>${escapeHTML(file.name)}</strong>...</span>
        </div>
      `, 'info');

      const formData = new FormData();
      formData.append('file', file);

      const url = `${API}/api/v1/ingest?collection_name=${encodeURIComponent(state.collection)}`;
      try {
        const res = await fetch(url, { method: 'POST', body: formData });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }
        const data = await res.json();
        const methods = data.methods_used.join(', ');
        await loadDocuments();
        resetDropZone();
        showUploadStatus(`
          <div class="font-medium">${escapeHTML(data.source)} ingested</div>
          <div class="mt-1 text-xs opacity-80">
            ${data.total_pages} page(s), ${data.total_chunks} chunks &middot;
            method: ${methods}
          </div>
        `, 'success');
      } catch (err) {
        resetDropZone();
        showUploadStatus(`Upload failed: ${escapeHTML(err.message)}`, 'error');
      } finally {
        fileInput.value = '';
      }
    }

    // ---- init ----
    loadDocuments();
  </script>
</body>
</html>
